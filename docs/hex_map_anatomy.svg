<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="hexMapTitle hexMapDesc">
  <title id="hexMapTitle">HexFinity 3×3 map anatomy (flat-top, odd-q offset)</title>
  <desc id="hexMapDesc">A 3-by-3 grid of flat-top hexagonal tiles laid out with odd-q offset (every other column shifted up by half a row). Each tile is labelled with its (q, r) coordinate. One interior vertex is highlighted in red to illustrate that three tiles meet at every interior vertex of the tessellation: editing tile (0, 0)'s upper-right corner P1 propagates to tile (0, 1)'s lower-right corner P3 and to tile (1, 0)'s left corner P5, keeping their levels (and so the seam height) locked together.</desc>

  <rect x="0" y="0" width="600" height="420" fill="#fafafa"/>

  <defs>
    <marker id="arrowEnd" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 0 10 L 10 5 z" fill="#c0392b"/>
    </marker>
  </defs>

  <text x="300" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333">3×3 map — flat-top, odd-q offset</text>

  <!-- ===== Tiles ===== -->
  <!-- Each hex: R = 35 svg units. col_pitch = 52.5, row_pitch ≈ 60.62. Odd
       columns are shifted up by row_pitch/2 ≈ 30.31. Origin (240, 270) is
       tile (0, 0). World +Y is up (= -y in SVG), matching the top-view
       convention in hex_anatomy.svg. -->

  <!-- Row r=0 -->
  <polygon points="257.5,239.69 275,270 257.5,300.31 222.5,300.31 205,270 222.5,239.69" fill="#e6f0fa" stroke="#333" stroke-width="1.4"/>
  <polygon points="310,209.38 327.5,239.69 310,270 275,270 257.5,239.69 275,209.38"     fill="#e6f0fa" stroke="#333" stroke-width="1.4"/>
  <polygon points="362.5,239.69 380,270 362.5,300.31 327.5,300.31 310,270 327.5,239.69" fill="#e6f0fa" stroke="#333" stroke-width="1.4"/>

  <!-- Row r=1 -->
  <polygon points="257.5,179.07 275,209.38 257.5,239.69 222.5,239.69 205,209.38 222.5,179.07" fill="#e6f0fa" stroke="#333" stroke-width="1.4"/>
  <polygon points="310,148.77 327.5,179.08 310,209.39 275,209.39 257.5,179.08 275,148.77"     fill="#e6f0fa" stroke="#333" stroke-width="1.4"/>
  <polygon points="362.5,179.07 380,209.38 362.5,239.69 327.5,239.69 310,209.38 327.5,179.07" fill="#e6f0fa" stroke="#333" stroke-width="1.4"/>

  <!-- Row r=2 -->
  <polygon points="257.5,118.46 275,148.77 257.5,179.08 222.5,179.08 205,148.77 222.5,118.46" fill="#e6f0fa" stroke="#333" stroke-width="1.4"/>
  <polygon points="310,88.15 327.5,118.46 310,148.77 275,148.77 257.5,118.46 275,88.15"       fill="#e6f0fa" stroke="#333" stroke-width="1.4"/>
  <polygon points="362.5,118.46 380,148.77 362.5,179.08 327.5,179.08 310,148.77 327.5,118.46" fill="#e6f0fa" stroke="#333" stroke-width="1.4"/>

  <!-- ===== Tile labels (q, r) at each tile centre ===== -->
  <text x="240" y="274" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">(0, 0)</text>
  <text x="292.5" y="243.69" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">(1, 0)</text>
  <text x="345" y="274" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">(2, 0)</text>
  <text x="240" y="213.38" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">(0, 1)</text>
  <text x="292.5" y="183.08" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">(1, 1)</text>
  <text x="345" y="213.38" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">(2, 1)</text>
  <text x="240" y="152.77" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">(0, 2)</text>
  <text x="292.5" y="122.46" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">(1, 2)</text>
  <text x="345" y="152.77" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#333">(2, 2)</text>

  <!-- ===== Highlighted shared vertex (3-tile meet) ===== -->
  <!-- The vertex at SVG (257.5, 239.69) is simultaneously (0,0).P1,
       (0,1).P3, and (1,0).P5 — exactly the case described in the
       SHARED_CORNERS table for P1 (it shares with N.P3 + NE.P5). -->
  <circle cx="257.5" cy="239.69" r="6" fill="#c0392b"/>

  <!-- Annotation arrow + label off to the left. -->
  <line x1="100" y1="350" x2="248" y2="244" stroke="#c0392b" stroke-width="1.6" marker-end="url(#arrowEnd)"/>
  <text x="95" y="365" text-anchor="start" font-family="sans-serif" font-size="13" font-weight="bold" fill="#c0392b">shared vertex (three tiles meet)</text>
  <text x="95" y="383" text-anchor="start" font-family="sans-serif" font-size="12" fill="#333">edit (0, 0).P1 →</text>
  <text x="95" y="399" text-anchor="start" font-family="sans-serif" font-size="12" fill="#333">propagates to (0, 1).P3 and (1, 0).P5</text>

  <!-- ===== Compass / direction key ===== -->
  <g transform="translate(490, 200)">
    <circle cx="0" cy="0" r="50" fill="none" stroke="#999" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="0" y="-58" text-anchor="middle" font-family="sans-serif" font-size="11" font-style="italic" fill="#666">neighbour directions</text>

    <!-- N at top, S at bottom; NE upper-right, NW upper-left etc.
         The diagram uses world +Y = up (= -y in SVG). -->
    <text x="0"   y="-38" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">N</text>
    <text x="35"  y="-15" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">NE</text>
    <text x="35"  y="22"  text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">SE</text>
    <text x="0"   y="45"  text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">S</text>
    <text x="-35" y="22"  text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">SW</text>
    <text x="-35" y="-15" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#333">NW</text>

    <line x1="0" y1="-5" x2="0"   y2="-30" stroke="#666" stroke-width="1"/>
    <line x1="0" y1="-5" x2="22"  y2="-15" stroke="#666" stroke-width="1"/>
    <line x1="0" y1="5"  x2="22"  y2="15"  stroke="#666" stroke-width="1"/>
    <line x1="0" y1="5"  x2="0"   y2="30"  stroke="#666" stroke-width="1"/>
    <line x1="0" y1="5"  x2="-22" y2="15"  stroke="#666" stroke-width="1"/>
    <line x1="0" y1="-5" x2="-22" y2="-15" stroke="#666" stroke-width="1"/>
  </g>
</svg>
